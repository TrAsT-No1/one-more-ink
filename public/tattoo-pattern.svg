<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <style>
      .icon { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .filled { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.07); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Row 1 -->

  <!-- Heart with banner — x:30 y:25 -->
  <g transform="translate(30,25)">
    <path class="filled" d="M0,-8 C-2,-14 -10,-14 -10,-6 C-10,0 0,10 0,10 C0,10 10,0 10,-6 C10,-14 2,-14 0,-8Z"/>
    <path class="icon" d="M-12,2 L-8,1 L-6,4 L6,4 L8,1 L12,2"/>
  </g>

  <!-- Skull — x:100 y:30 -->
  <g transform="translate(100,30)">
    <ellipse class="filled" cx="0" cy="-3" rx="9" ry="10"/>
    <circle class="icon" cx="-3.5" cy="-5" r="2.5"/>
    <circle class="icon" cx="3.5" cy="-5" r="2.5"/>
    <path class="icon" d="M-1.5,1 L0,3 L1.5,1"/>
    <path class="icon" d="M-4,6 L-2,5 L0,6 L2,5 L4,6"/>
  </g>

  <!-- Swallow — x:180 y:20 -->
  <g transform="translate(180,20)">
    <path class="filled" d="M0,0 C4,-2 8,-1 12,2 L8,3 L14,6 C8,4 4,4 0,2Z"/>
    <path class="icon" d="M0,0 C-3,-1 -6,0 -8,2"/>
    <path class="icon" d="M-8,2 C-10,5 -14,6 -16,5"/>
    <path class="icon" d="M-8,2 C-10,4 -13,7 -16,8"/>
    <circle class="filled" cx="-2" cy="0" r="1"/>
  </g>

  <!-- Dagger — x:260 y:25 -->
  <g transform="translate(260,25)">
    <path class="icon" d="M0,-14 L2,-4 L0,10 L-2,-4Z"/>
    <path class="icon" d="M-5,-4 L5,-4"/>
    <path class="icon" d="M-5,-3 L-5,-5"/>
    <path class="icon" d="M5,-3 L5,-5"/>
    <circle class="icon" cx="0" cy="-14" r="1.5"/>
  </g>

  <!-- Rose — x:335 y:28 -->
  <g transform="translate(335,28)">
    <path class="filled" d="M0,-6 C-3,-8 -7,-6 -8,-2 C-9,3 -4,7 0,8 C4,7 9,3 8,-2 C7,-6 3,-8 0,-6Z"/>
    <path class="icon" d="M0,-3 C-2,-5 -5,-3 -4,0 C-3,2 0,3 0,3"/>
    <path class="icon" d="M0,-3 C2,-5 5,-3 4,0 C3,2 0,3 0,3"/>
    <path class="icon" d="M0,8 C0,8 -2,12 -4,14"/>
    <path class="icon" d="M0,10 C2,10 5,8 5,8"/>
  </g>

  <!-- Row 2 (offset) -->

  <!-- Anchor — x:55 y:105 -->
  <g transform="translate(55,105)">
    <circle class="icon" cx="0" cy="-12" r="3"/>
    <path class="icon" d="M0,-9 L0,10"/>
    <path class="icon" d="M-8,6 C-8,12 0,16 0,10"/>
    <path class="icon" d="M8,6 C8,12 0,16 0,10"/>
    <path class="icon" d="M-5,-6 L5,-6"/>
  </g>

  <!-- Diamond — x:140 y:100 -->
  <g transform="translate(140,100)">
    <path class="filled" d="M0,-10 L10,0 L0,12 L-10,0Z"/>
    <path class="icon" d="M-10,0 L10,0"/>
    <path class="icon" d="M-5,-10 L0,0 L5,-10"/>
  </g>

  <!-- Star/sparkle — x:215 y:100 -->
  <g transform="translate(215,100)">
    <path class="filled" d="M0,-10 L2,-3 L10,-2 L3,2 L5,10 L0,5 L-5,10 L-3,2 L-10,-2 L-2,-3Z"/>
  </g>

  <!-- Panther head — x:290 y:105 -->
  <g transform="translate(290,105)">
    <path class="filled" d="M-8,-10 C-12,-6 -12,2 -8,6 C-4,10 4,10 8,6 C12,2 12,-6 8,-10 C4,-8 -4,-8 -8,-10Z"/>
    <path class="icon" d="M-4,-4 L-2,-2"/>
    <path class="icon" d="M4,-4 L2,-2"/>
    <path class="icon" d="M-5,2 C-3,5 3,5 5,2"/>
    <path class="icon" d="M-3,3 L-2,5 L0,3 L2,5 L3,3"/>
  </g>

  <!-- Snake — x:370 y:100 -->
  <g transform="translate(370,100)">
    <path class="icon" d="M-8,-10 C-4,-6 4,-8 6,-4 C8,0 4,4 0,2 C-4,0 -6,4 -4,8 C-2,12 2,10 4,8"/>
    <circle class="filled" cx="-8" cy="-10" r="2"/>
  </g>

  <!-- Scattered small elements -->
  <path class="icon" d="M65,60 L67,55 L69,60" /> <!-- tiny heart -->
  <path class="icon" d="M200,160 L202,155 L204,160" />
  <circle class="icon" cx="310" cy="55" r="2" />
  <path class="icon" d="M155,165 L157,160 L159,165" />
  <path class="icon" d="M370,165 L372,160 L374,165" />

  <!-- Small crosses -->
  <g class="icon">
    <line x1="48" y1="68" x2="52" y2="68"/>
    <line x1="50" y1="66" x2="50" y2="70"/>
  </g>
  <g class="icon">
    <line x1="248" y1="160" x2="252" y2="160"/>
    <line x1="250" y1="158" x2="250" y2="162"/>
  </g>
  <g class="icon">
    <line x1="118" y1="70" x2="122" y2="70"/>
    <line x1="120" y1="68" x2="120" y2="72"/>
  </g>

  <!-- Small dots -->
  <circle class="filled" cx="170" cy="55" r="1.2"/>
  <circle class="filled" cx="85" cy="155" r="1.2"/>
  <circle class="filled" cx="330" cy="155" r="1.2"/>

</svg>
